<!DOCTYPE html>
<html>
<head>
  <title>Minimal Login Test</title>
</head>
<body>
  <h2>Minimal Login Test</h2>
  <button id="testLogin">Send Login Request</button>
  <div id="loginMessage"></div>

  <script>
    document.getElementById('testLogin').addEventListener('click', async () => {
      try {
        const response = await fetch('http://localhost:5000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: "abc@test.com", password: "password" })
        });

        console.log("Login response status:", response.status);
        const result = await response.json();
        console.log("Login result:", result);

        if (result.success) {
          localStorage.setItem('authToken', result.token);
          document.getElementById('loginMessage').innerText = "Login successful!";
        } else {
          document.getElementById('loginMessage').innerText = "Invalid credentials!";
        }
      } catch (error) {
        console.error("Login error:", error);
        document.getElementById('loginMessage').innerText = "Server error.";
      }
    });
  </script>
</body>
</html>
