<!DOCTYPE html>
<html>
<head>
  <title>Tezz - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Tezz Customer Portal</h1>
  </header>

  <main>
    <section class="search-section">
      <h2>Customer Search</h2>
      <div class="search-box">
        <input type="text" id="searchBox" placeholder="Enter customer name">
        <button onclick="searchCustomer()">Search</button>
      </div>
    </section>

    <section id="results" class="results-section">
      <!-- Search results will appear here -->
    </section>
  </main>

 <script>
  async function searchCustomer() {
    const queryElement = document.getElementById('searchBox');
    if (!queryElement) {
      console.error("searchBox not found in DOM!");
      return;
    }

    const query = queryElement.value.trim();
    console.log("searchCustomer called, query:", query);

    if (!query) {
      document.getElementById('results').innerHTML =
        "<p class='error'>Please enter a customer name.</p>";
      return;
    }

    try {
      const response = await fetch('http://localhost:4000/api/customers/' + query, {
        method: 'GET',
        credentials: "include", // ✅ ensures HttpOnly cookie is sent
        headers: {
          'Content-Type': 'application/json'
          // ❌ no Authorization header needed
        }
      });

      console.log("Response status:", response.status);

      if (!response.ok) {
        throw new Error("Server returned " + response.status);
      }

      const results = await response.json();
      document.getElementById('results').innerHTML =
        results.length > 0
          ? results.map(c => `<div class="customer-card"><strong>${c.name}</strong><br>${c.email}</div>`).join("")
          : "<p>No customer found.</p>";
    } catch (error) {
      console.error("Error fetching customers:", error);
      document.getElementById('results').innerHTML =
        "<p class='error'>Could not fetch customers.</p>";
    }
  }
</script>
